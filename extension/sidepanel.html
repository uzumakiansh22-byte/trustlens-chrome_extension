<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>TrustLens PRO Dashboard</title>
</head>
<body>
    <header>
        <div class="glow-dot"></div>
        <h1>TRUST<span>LENS</span> PRO</h1>
    </header>

    <main id="output">
        <div class="idle-state">SYSTEM READY FOR AUDIT</div>
    </main>

    <div class="control-panel">
        <input type="text" id="manual-url" placeholder="Paste Media URL or News Claim...">
        
        <textarea id="video-transcript" placeholder="Optional: Paste Video Transcript to fact-check speech..." style="width:100%; height:40px; margin-top:8px; border-radius:8px; background:#1e293b; border:1px solid #334155; color:white; font-size:0.7rem; padding:8px;"></textarea>

        <div class="input-group" style="margin-top:10px; display:flex; gap:5px;">
            <button id="url-btn" style="flex:1;">SCAN MEDIA</button>
            <button id="text-btn" style="flex:1; background:var(--yellow);">CHECK TEXT</button>
        </div>
        
        <input type="file" id="file-in" style="display:none" accept="image/*">
        <button class="secondary-btn" id="fake-upload-btn" style="width:100%; margin-top:5px;">UPLOAD FOR FORENSICS</button>
    </div>

    <div id="agent-section" style="margin-top:20px; border-top:1px solid #333; padding-top:15px; padding: 0 15px;">
        <h4 style="color:#00ffcc; margin:0 0 10px 0; font-size: 0.9rem; letter-spacing: 1px;">💬 FORENSIC INVESTIGATOR</h4>
        <div id="chat-box" style="height:250px; overflow-y:auto; background:#000; padding:12px; border-radius:8px; font-size:0.85rem; border:1px solid #222; margin-bottom: 12px; line-height: 1.4;">
            <em style="color: #666;">Perform a scan to begin investigation...</em>
        </div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="user-query" placeholder="Ask about the pillars, flags, or news..." style="flex:1; background:#111; color:white; border:1px solid #333; padding:10px; border-radius:4px; font-size: 0.85rem;">
            <button id="ask-btn" style="background:#00ffcc; color:black; border:none; padding:10px 15px; border-radius:4px; font-weight:bold; cursor:pointer; font-size: 0.85rem;">ASK</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
