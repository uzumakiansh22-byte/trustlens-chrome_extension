<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustLens PRO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="glass-theme">
    <div class="header">
        <h1>TrustLens <span>PRO</span></h1>
    </div>

    <div class="control-card card">
        <input type="text" id="manual-url" placeholder="Paste URL for scan...">
        <div class="btn-row">
            <button id="url-btn">🔍 Scan URL</button>
            <button id="upload-trigger">📁 Upload</button>
        </div>
        <input type="file" id="file-in" hidden>
    </div>

    <div id="scan-results" class="results-container">
        <p class="idle-text">Ready for forensic audit...</p>
    </div>

    <div class="chat-card card">
        <h3>TrustLens Assistant</h3>
        <div id="chat-box" class="chat-display"></div>
        <div class="chat-input-row">
            <input type="text" id="chat-input" placeholder="Ask Gemini...">
            <button id="send-chat">Send</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
